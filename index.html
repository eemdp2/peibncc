<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptador BNCC - Imagem e PDF</title>
    <style>
        :root { --primary: #4834d4; --secondary: #22a6b3; --success: #6ab04c; --bg: #f6f9fc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 20px; color: #30336b; }
        .container { max-width: 800px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        h1 { text-align: center; font-size: 22px; margin-bottom: 30px; color: var(--primary); border-bottom: 2px solid #f1f2f6; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #edeff2; border-radius: 10px; font-size: 14px; transition: 0.3s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background: #fff; }
        textarea { height: 100px; resize: vertical; }

        /* Estilização do Campo de Arquivo */
        .file-drop-area { border: 2px dashed var(--secondary); padding: 25px; text-align: center; border-radius: 10px; background: #f0fbfc; cursor: pointer; transition: 0.3s; position: relative; }
        .file-drop-area:hover { background: #e0f7f8; }
        .file-drop-area input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .file-msg { font-size: 13px; color: #535c68; }

        button.btn-generate { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; box-shadow: 0 4px 15px rgba(72, 52, 212, 0.3); }
        button:disabled { background: #dcdde1; box-shadow: none; cursor: not-allowed; }

        #result-container { margin-top: 35px; display: none; }
        .result-box { background: #fff; border: 1px solid #dff9fb; padding: 20px; border-radius: 12px; border-left: 6px solid var(--success); white-space: pre-wrap; font-size: 15px; line-height: 1.7; position: relative; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; float: right; font-size: 13px; margin-bottom: 10px; }
        
        .loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Adaptador BNCC (Laudo em Imagem ou PDF)</h1>
    
    <div class="form-group">
        <label>Nome do Estudante / Disciplina</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="aluno" placeholder="Nome do Aluno">
            <input type="text" id="materia" placeholder="Disciplina">
        </div>
    </div>

    <div class="form-group">
        <label>Habilidades BNCC e Objetos de Conhecimento</label>
        <textarea id="habilidades" placeholder="Cole aqui os códigos e os textos das habilidades originais..."></textarea>
    </div>

    <div class="form-group">
        <label>Laudo do Estudante (Anexe Imagem ou PDF)</label>
        <div class="file-drop-area">
            <span class="file-msg" id="file-name">Clique para anexar o Laudo (PDF, JPG, PNG)</span>
            <input type="file" id="laudo-file" accept="image/*,application/pdf" onchange="updateFileName()">
        </div>
    </div>

    <button class="btn-generate" onclick="executarAdaptacao()">ADAPTAR HABILIDADES AGORA</button>

    <div id="loader" class="loader">⚙️ A IA está a ler o laudo e a reescrever as habilidades...</div>

    <div id="result-container">
        <button class="btn-copy" onclick="copiar()">📋 Copiar Resultado</button>
        <div id="resultado" class="result-box"></div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyBK2WF-IkSqFmTpSPf8hZ8oWgJtaNWw8lI"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    // Função aprimorada para converter arquivo para Base64 com tratamento de erro
    async function fileToPart(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64Data = reader.result.split(',')[1];
                if (!base64Data) {
                    reject("Erro ao ler o conteúdo do arquivo.");
                    return;
                }
                resolve({
                    inlineData: { 
                        data: base64Data, 
                        mimeType: file.type || "application/pdf" // Força PDF se estiver vazio
                    }
                });
            };
            reader.onerror = () => reject("Erro no leitor de arquivos.");
            reader.readAsDataURL(file);
        });
    }

    window.executarAdaptacao = async function() {
        const fileInput = document.getElementById('laudo-file');
        const bnccText = document.getElementById('habilidades').value;
        const aluno = document.getElementById('aluno').value || "o estudante";
        const materia = document.getElementById('materia').value || "a disciplina";
        const loader = document.getElementById('loader');
        const container = document.getElementById('result-container');
        const resDiv = document.getElementById('resultado');
        const btn = document.querySelector('.btn-generate');

        if (!fileInput.files[0] || !bnccText) {
            alert("Por favor, anexe o laudo (PDF ou Imagem) e as habilidades BNCC.");
            return;
        }

        // Validação de tamanho (Aumentei para 10MB para garantir)
        if (fileInput.files[0].size > 10 * 1024 * 1024) {
            alert("O arquivo é muito grande. Tente um arquivo de até 10MB.");
            return;
        }

        loader.style.display = 'block';
        container.style.display = 'none';
        btn.disabled = true;

        try {
            // Usando o modelo 1.5 Flash que é otimizado para multimodal (arquivos + texto)
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const filePart = await fileToPart(fileInput.files[0]);

            const prompt = `
                Você é um especialista em educação especial e inclusiva.
                Ação: Leia o laudo anexo e entenda as necessidades específicas de ${aluno}.
                Tarefa: Adapte as seguintes habilidades da BNCC para a disciplina de ${materia}:
                
                "${bnccText}"

                Instruções de Formatação:
                1. Insira o termo "ADAPTADA" antes de cada código de habilidade.
                2. Simplifique a linguagem e o nível de complexidade com base no laudo lido.
                3. Adicione uma estratégia didática curta para cada uma.
                4. NÃO use asteriscos (**) para negrito. Use texto limpo.
                5. Separe as habilidades com "---".
            `;

            const result = await model.generateContent([prompt, filePart]);
            const response = await result.response;
            const text = response.text();

            if (!text) throw new Error("A IA não retornou resposta.");

            resDiv.innerText = text.replace(/\*/g, ''); 
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });

        } catch (e) {
            console.error("Erro detalhado:", e);
            alert("Erro ao processar: " + (e.message || "Verifique sua conexão ou o formato do arquivo."));
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    window.copiar = function() {
        const texto = document.getElementById('resultado').innerText;
        navigator.clipboard.writeText(texto).then(() => {
            alert("Texto copiado para a área de transferência!");
        });
    }

    window.updateFileName = function() {
        const input = document.getElementById('laudo-file');
        const msg = document.getElementById('file-name');
        if(input.files.length > 0) msg.innerText = "📄 " + input.files[0].name;
    };
</script>

</body>
</html>
